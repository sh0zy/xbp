<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1433"/>
      <stop offset="100%" stop-color="#1A2458"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD79A"/>
      <stop offset="100%" stop-color="#F6B65B"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A7AEFF"/>
      <stop offset="100%" stop-color="#6F7BFF"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F6B65B"/>
      <stop offset="50%" stop-color="#7FE3C4"/>
      <stop offset="100%" stop-color="#6F7BFF"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Flow line connecting morning to night -->
  <path d="M 190 600 C 340 420, 460 780, 600 560 S 820 380, 860 520"
        fill="none" stroke="url(#flow)" stroke-width="46" stroke-linecap="round"/>
  <!-- Sun (morning) -->
  <circle cx="240" cy="360" r="120" fill="url(#sun)"/>
  <g stroke="#F6B65B" stroke-width="22" stroke-linecap="round">
    <line x1="240" y1="180" x2="240" y2="130"/>
    <line x1="120" y1="360" x2="70" y2="360"/>
    <line x1="155" y1="275" x2="115" y2="235"/>
    <line x1="155" y1="445" x2="115" y2="485"/>
  </g>
  <!-- Moon (night) -->
  <path d="M 830 320 a 140 140 0 1 1 -130 -190 a 110 110 0 0 0 130 190 Z" fill="url(#moon)"/>
  <!-- Check dot at end of flow -->
  <circle cx="860" cy="520" r="28" fill="#7FE3C4"/>
</svg>
