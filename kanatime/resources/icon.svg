<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b8af5"/>
      <stop offset="100%" stop-color="#8b6cf5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Grid lines (timetable) -->
  <g stroke="url(#accent)" stroke-width="2" opacity="0.3">
    <line x1="170" y1="100" x2="170" y2="412"/>
    <line x1="256" y1="100" x2="256" y2="412"/>
    <line x1="342" y1="100" x2="342" y2="412"/>
    <line x1="100" y1="186" x2="412" y2="186"/>
    <line x1="100" y1="256" x2="412" y2="256"/>
    <line x1="100" y1="326" x2="412" y2="326"/>
  </g>
  <!-- K letter -->
  <g fill="url(#accent)">
    <rect x="140" y="140" width="32" height="232" rx="6"/>
    <polygon points="172,256 280,140 320,140 210,256 320,372 280,372"/>
  </g>
  <!-- Highlight cell -->
  <rect x="260" y="190" width="78" height="62" rx="10" fill="url(#accent)" opacity="0.5"/>
  <rect x="260" y="260" width="78" height="62" rx="10" fill="#4ade80" opacity="0.4"/>
  <rect x="342" y="120" width="66" height="62" rx="10" fill="#fb923c" opacity="0.35"/>
</svg>
