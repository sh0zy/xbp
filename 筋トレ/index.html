<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Workout Tracker</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0d0d0d;
    color: #fff;
  }

  h1 {
    text-align: center;
    margin-top: 20px;
    font-size: 2.2rem;
    font-weight: 700;
    color: #00eaff;
    text-shadow: 0 0 10px #00eaff;
  }

  .container {
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
  }

  .card {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,255,255,0.1);
    margin-bottom: 20px;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  label {
    display: block;
    margin-bottom: 10px;
    font-size: 0.9rem;
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    margin-top: 4px;
    background: #333;
    color: #fff;
  }

  button {
    padding: 12px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
    transition: 0.2s;
  }

  button.primary {
    background: #00eaff;
    color: #000;
    box-shadow: 0 0 10px #00eaff;
  }
  button.primary:hover {
    background: #00bcd4;
  }

  button.danger {
    background: #ff3b3b;
    color: #fff;
    box-shadow: 0 0 10px #ff3b3b;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    font-size: 0.9rem;
  }

  th, td {
    padding: 10px;
    border-bottom: 1px solid #333;
    text-align: center;
  }

  th {
    background: #111;
  }

  .summary-box {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .summary-item {
    flex: 1;
    min-width: 180px;
    background: #111;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,255,255,0.1);
  }

  .bar {
    height: 8px;
    background: #00eaff;
    border-radius: 4px;
    margin-top: 6px;
    box-shadow: 0 0 8px #00eaff;
  }
</style>
</head>
<body>

<h1>🔥 Workout Tracker</h1>

<div class="container">

  <div class="card">
    <form id="logForm">
      <label>日付 <input type="date" id="date" required></label>
      <label>種目 <input type="text" id="exercise" required></label>
      <label>セット数 <input type="number" id="sets" value="3" required></label>
      <label>回数 <input type="number" id="reps" value="10" required></label>
      <label>重量(kg) <input type="number" id="weight" value="0"></label>
      <label>筋トレ時間(分) <input type="number" id="duration" value="30" required></label>
      <label>プロテイン(g) <input type="number" id="protein" value="20" required></label>
      <button class="primary" type="submit">＋ 記録を追加</button>
    </form>
  </div>

  <div class="card">
    <h2>📊 今日の成果</h2>
    <div class="summary-box" id="summary"></div>
  </div>

  <div class="card">
    <h2>📘 記録一覧</h2>
    <table>
      <thead>
        <tr>
          <th>日付</th><th>種目</th><th>セット</th><th>回数</th><th>重量</th><th>時間</th><th>プロテイン</th><th>削除</th>
        </tr>
      </thead>
      <tbody id="logTableBody"></tbody>
    </table>
  </div>

</div>

<script>
const STORAGE_KEY = "workout_logs_v2";

function loadLogs() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

function saveLogs(logs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
}

function renderSummary(logs) {
  const today = new Date().toISOString().slice(0, 10);
  const todayLogs = logs.filter(l => l.date === today);

  const protein = todayLogs.reduce((s, l) => s + Number(l.protein), 0);
  const duration = todayLogs.reduce((s, l) => s + Number(l.duration), 0);

  const summary = document.getElementById("summary");
  summary.innerHTML = `
    <div class="summary-item">
      <div>プロテイン</div>
      <strong>${protein} g</strong>
      <div class="bar" style="width:${Math.min(protein,100)}%"></div>
    </div>
    <div class="summary-item">
      <div>筋トレ時間</div>
      <strong>${duration} 分</strong>
      <div class="bar" style="width:${Math.min(duration,120)}%"></div>
    </div>
  `;
}

function renderLogs() {
  const logs = loadLogs();
  const tbody = document.getElementById("logTableBody");
  tbody.innerHTML = "";

  logs.forEach(log => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${log.date}</td>
      <td>${log.exercise}</td>
      <td>${log.sets}</td>
      <td>${log.reps}</td>
      <td>${log.weight}</td>
      <td>${log.duration}</td>
      <td>${log.protein}</td>
      <td><button class="danger" onclick="deleteLog(${log.id})">削除</button></td>
    `;
    tbody.appendChild(tr);
  });

  renderSummary(logs);
}

function deleteLog(id) {
  let logs = loadLogs();
  logs = logs.filter(l => l.id !== id);
  saveLogs(logs);
  renderLogs();
}

document.getElementById("logForm").addEventListener("submit", e => {
  e.preventDefault();

  const log = {
    id: Date.now(),
    date: date.value,
    exercise: exercise.value,
    sets: Number(sets.value),
    reps: Number(reps.value),
    weight: Number(weight.value),
    duration: Number(duration.value),
    protein: Number(protein.value)
  };

  const logs = loadLogs();
  logs.push(log);
  saveLogs(logs);
  renderLogs();
  e.target.reset();
  date.value = new Date().toISOString().slice(0,10);
});

date.value = new Date().toISOString().slice(0,10);
renderLogs();
</script>

</body>
</html>
