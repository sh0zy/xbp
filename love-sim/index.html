<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>恋愛シミュレーション（デモ）</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header>
      <h1>恋愛シミュレーション — デモ</h1>
    </header>

    <section class="game-area">
      <aside class="character-panel">
        <div class="portrait-wrap">
          <img id="portraitImg" class="portrait-img" src="assets/aiko.svg" alt="portrait">
        </div>
        <div class="char-name" id="charName">---</div>
        <div class="affection">
          <label>好感度</label>
          <progress id="affection" value="0" max="100"></progress>
          <div id="affectionVal">0</div>
        </div>
      </aside>

      <section class="scene-panel">
        <div class="scene-bg"></div>
        <div id="sceneText" class="scene-text">読み込み中...</div>
        <div id="choices" class="choices"></div>
      </section>
    </section>

    <footer class="controls">
      <div class="slot-controls">
        <label for="slotSelect">セーブスロット:</label>
        <select id="slotSelect">
          <option value="1">スロット 1</option>
          <option value="2">スロット 2</option>
          <option value="3">スロット 3</option>
        </select>
        <button id="saveSlotBtn" class="btn">スロットにセーブ</button>
        <button id="loadSlotBtn" class="btn">スロットをロード</button>
      </div>
      <button id="resetBtn" class="btn">リセット</button>
    </footer>
  </main>

  <script src="game.js"></script>
</body>
</html>
