    <script>
        (function(){var t=localStorage.getItem("xbp-theme");if(t==="dark")document.documentElement.setAttribute("data-theme","dark");else if(!t&&window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches)document.documentElement.setAttribute("data-theme","dark");})();
    </script>
    <style>
        .hero-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1.5rem; }
        .primary-action { display: inline-flex; align-items: center; justify-content: center; min-height: 46px; padding: 0 22px; border-radius: 999px; background: linear-gradient(135deg, var(--accent), #5a5a8a); color: #fff; font-weight: 600; font-size: 0.9rem; box-shadow: 0 8px 24px rgba(61,61,107,0.2); transition: all 0.25s ease; }
        .primary-action:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(61,61,107,0.28); }
        .secondary-action { display: inline-flex; align-items: center; justify-content: center; min-height: 46px; padding: 0 20px; border-radius: 999px; border: 1px solid var(--line-outer); background: var(--surface-muted); color: var(--text); font-weight: 600; font-size: 0.9rem; transition: all 0.25s ease; }
        .secondary-action:hover { transform: translateY(-2px); background: var(--surface); }

        @media (max-width: 700px) {
            .hero-actions { flex-direction: column; }
        }

        .lesson-list { display: grid; gap: 0.75rem; margin-top: 1rem; }
        .lesson-card { display: flex; align-items: center; gap: 1rem; padding: 1.1rem 1.25rem; border-radius: var(--radius-md); background: var(--surface-muted); border: 1px solid var(--line-outer); color: var(--text); transition: all 0.25s ease; }
        .lesson-card:hover { background: var(--surface); transform: translateY(-2px); box-shadow: var(--shadow-soft); }
        .lesson-card .lesson-num { flex-shrink: 0; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--accent); color: #fff; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.04em; }
        .lesson-card .lesson-body { flex: 1; min-width: 0; }
        .lesson-card .lesson-title { font-size: 0.98rem; font-weight: 600; color: var(--text); margin-bottom: 0.15rem; }
        .lesson-card .lesson-sub { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }
        .lesson-card .lesson-arrow { flex-shrink: 0; color: var(--accent); font-size: 1.1rem; }
        .lesson-card.upcoming { opacity: 0.55; pointer-events: none; }
        .lesson-card.upcoming .lesson-num { background: var(--text-faint); }

        .section-label { display: block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.75rem; }
        .section-heading { font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 0.25rem; }
        .section-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="page-transition"></div>

    <header class="header">
        <a href="../index.html" class="logo-link">
            <img src="../images/0_XBlogo.png" alt="XB Logo" class="logo" loading="lazy">
        </a>
        <nav class="breadcrumb">
            <a href="../index.html">Portfolio</a>
            <span class="sep">/</span>
            <span>Design III・IV</span>
        </nav>
        <button class="theme-toggle" aria-label="テーマ切り替え">
            <span class="icon-sun">☀</span>
            <span class="icon-moon">☾</span>
        </button>

    <main class="main">
        <section class="hero">
            <span class="hero-tag">03 &mdash; Design Practice</span>
            <h1 class="hero-title">デザイン演習<br>III・IV</h1>
            <div class="hero-line"></div>
            <div class="hero-actions">
                <a href="../jishu/index.html" class="primary-action">自主制作アプリ一覧</a>
                <a href="../index.html" class="secondary-action">Portfolioへ戻る</a>
            </div>
        </section>

        <section class="section reveal">
            <div class="content-card">
                <span class="section-label">Lessons</span>
                <h2 class="section-heading">授業まとめ</h2>
                <p class="section-desc">毎回の授業内容を回ごとにまとめています。</p>
                <div class="lesson-list">
                    <a href="01/index.html" class="lesson-card">
                        <span class="lesson-num">01</span>
                        <span class="lesson-body">
                            <span class="lesson-title">第一回 &mdash; Arduino入門</span>
                            <span class="lesson-sub">Arduinoの設定 / Lチカ / CdSで明るさ測定</span>
                        </span>
                        <span class="lesson-arrow">&rarr;</span>
                    </a>
                    <a href="02/index.html" class="lesson-card">

                        </span>
                        <span class="lesson-arrow">&rarr;</span>
                    </a>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <div class="content-card" style="text-align:center; padding:2rem;">
                <p style="color:var(--text-muted); font-size:0.85rem; line-height:1.8;">自主制作アプリは<a href="../jishu/index.html" style="color:var(--accent); font-weight:600; border-bottom:1px solid var(--accent-line);">こちら</a>に移動しました。</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span class="footer-brand">XBP</span>
            <p class="footer-copy">&copy; <span data-current-year>2026</span> sh0zy</p>
        </div>
    </footer>

    <button class="page-top-btn" aria-label="ページトップへ戻る">&uarr;</button>
    <script src="../js/common.js"></script>
