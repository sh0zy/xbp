<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="128" fill="#1e293b"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#0ea5e9" stroke-width="12" opacity="0.3"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#0ea5e9" stroke-width="8" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="30" fill="#0ea5e9"/>
  <!-- Spark lines - clock marks -->
  <line x1="256" y1="76" x2="256" y2="110" stroke="#38bdf8" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="402" x2="256" y2="436" stroke="#38bdf8" stroke-width="12" stroke-linecap="round"/>
  <line x1="76" y1="256" x2="110" y2="256" stroke="#38bdf8" stroke-width="12" stroke-linecap="round"/>
  <line x1="402" y1="256" x2="436" y2="256" stroke="#38bdf8" stroke-width="12" stroke-linecap="round"/>
  <!-- Diagonal marks -->
  <line x1="149" y1="149" x2="170" y2="170" stroke="#0284c7" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="342" y1="342" x2="363" y2="363" stroke="#0284c7" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="363" y1="149" x2="342" y2="170" stroke="#0284c7" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="149" y1="363" x2="170" y2="342" stroke="#0284c7" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <!-- F letter hint -->
  <text x="256" y="280" font-family="system-ui, sans-serif" font-weight="700" font-size="48" fill="#f1f5f9" text-anchor="middle" opacity="0.0">F</text>
</svg>
