<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#081a2f" />
    <title>English Quest RPG Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: sans-serif;
        color: #eff8ff;
        background: linear-gradient(155deg, #061321, #102f3a);
      }
      main {
        width: min(88vw, 360px);
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 22px;
        background: rgba(8, 26, 47, 0.82);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 0;
        line-height: 1.7;
        color: #a8dcff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline Quest</h1>
      <p>ネットワークに接続できません。保存済みのアプリ画面がある場合は、再読み込み後に続きから遊べます。</p>
    </main>
  </body>
</html>
